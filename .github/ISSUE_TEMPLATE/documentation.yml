name: Documentation issue
description: Report unclear, outdated, or missing documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets, passwords, tokens, private keys, or unmasked SSH host/user values in documentation reports or examples.
  - type: input
    id: affected_document
    attributes:
      label: Affected document
      description: Name the README, docs page, release note, or section.
      placeholder: "README.md"
    validations:
      required: true
  - type: textarea
    id: confusing_section
    attributes:
      label: Confusing section
      description: Describe the confusing, outdated, or missing part.
    validations:
      required: true
  - type: textarea
    id: expected_clarification
    attributes:
      label: Expected clarification
      description: What should the documentation explain?
    validations:
      required: true
  - type: textarea
    id: suggested_wording
    attributes:
      label: Suggested wording
      description: Optional wording or example. Keep connection details masked.
    validations:
      required: false
  - type: checkboxes
    id: redaction
    attributes:
      label: Sensitive data check
      options:
        - label: Any host, user, log, or command example in this report is sanitized.
          required: true
