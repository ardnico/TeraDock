name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for artifact-only validation builds"
        required: true
        default: "0.1.0-rc-artifact"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install libudev (build deps)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Build release binary
        run: cargo build -p td --release --locked

      # ----------------
      # Linux packaging
      # ----------------
      - name: Install cargo-deb
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb

      - name: Build deb package
        if: runner.os == 'Linux'
        run: cargo deb -p td --no-build

      - name: Install cargo-generate-rpm
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-generate-rpm

      - name: Strip binary (recommended)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          strip -s target/release/td

      - name: Build rpm package (cargo-generate-rpm)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          # workspaceメンバを指定（READMEの推奨）
          cargo generate-rpm -p crates/cli

      - name: Build tar.gz archive
        if: runner.os == 'Linux'
        run: packaging/linux/package-tar.sh "${{ steps.version.outputs.version }}"

      - name: Stage Linux packages
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/debian/*.deb dist/
          cp target/generate-rpm/*.rpm dist/

      - name: Generate checksums (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum td-*-linux-x86_64.tar.gz *.deb *.rpm > SHA256SUMS-linux-x86_64

      # ----------------
      # Windows packaging
      # ----------------
      - name: Install Inno Setup
        if: runner.os == 'Windows'
        run: choco install innosetup --no-progress

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion="${{ steps.version.outputs.version }}" `
            "packaging\windows\td.iss"

      - name: Generate checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hashes = Get-FileHash -Algorithm SHA256 -Path "dist\td-*-windows-x86_64-setup.exe"
          $hashes |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $(Split-Path $_.Path -Leaf)" } |
            Set-Content -Encoding ASCII "dist\SHA256SUMS-windows-x86_64"

      # ----------------
      # Collect artifacts
      # ----------------
      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            dist/td-*-linux-x86_64.tar.gz
            dist/*.deb
            dist/*.rpm
            dist/SHA256SUMS-linux-x86_64

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            dist/td-*-windows-x86_64-setup.exe
            dist/SHA256SUMS-windows-x86_64

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-test')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create/Update release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
